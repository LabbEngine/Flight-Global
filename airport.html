<meta charset="utf-8" />
<title>FocusAir — 2D Airport</title>
<style>
  :root { --ink:#1b1e26; --panel:#fbf9f4; }
  * { box-sizing: border-box; }
  html, body {
    margin:0; height:100%; overflow:hidden; background:#0e1014;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); user-select:none; -webkit-font-smoothing:antialiased;
  }
  #game { display:block; position:absolute; inset:0; }

  #banner {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    background:rgba(18,20,26,.82); color:#fff; backdrop-filter:blur(8px);
    padding:10px 22px; border-radius:999px; font-size:15px; font-weight:600;
    white-space:nowrap; box-shadow:0 8px 26px rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.08); pointer-events:none; display:flex; gap:10px; align-items:center;
  }
  #banner .step-no { opacity:.5; font-weight:800; }
  #banner .dotix { width:7px; height:7px; border-radius:50%; background:#ffd24a; box-shadow:0 0 8px #ffd24a; }

  #prompt {
    position:absolute; bottom:86px; left:50%; transform:translateX(-50%);
    background:#ffd24a; color:#201a05; padding:9px 18px; border-radius:11px;
    font-size:15px; font-weight:700; box-shadow:0 8px 22px rgba(0,0,0,.4);
    opacity:0; transition:opacity .12s; pointer-events:none;
  }
  #prompt.show { opacity:1; }
  #prompt kbd { background:#201a05; color:#ffd24a; border-radius:5px; padding:1px 8px; font-weight:800; margin-right:7px; }

  #autopilot {
    position:absolute; top:16px; left:16px;
    background:linear-gradient(135deg,#3ad1b0,#1f9f9a); color:#04231f;
    padding:8px 14px; border-radius:11px; font-weight:800; font-size:13px; letter-spacing:1px;
    box-shadow:0 8px 22px rgba(0,0,0,.4); display:none; align-items:center; gap:8px;
  }
  #autopilot.on { display:flex; }
  #autopilot .dot { width:9px; height:9px; border-radius:50%; background:#04231f; animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  #toast {
    position:absolute; top:64px; left:50%; transform:translateX(-50%) translateY(-14px);
    background:linear-gradient(135deg,#ffd24a,#f0a800); color:#241c00;
    padding:12px 26px; border-radius:14px; font-weight:800; font-size:18px; letter-spacing:.3px;
    box-shadow:0 12px 34px rgba(0,0,0,.45); opacity:0; transition:opacity .3s, transform .3s; pointer-events:none;
    display:flex; align-items:center; gap:10px;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast .pin { font-size:20px; }

  #controls {
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    display:flex; gap:14px; background:rgba(18,20,26,.72); color:#e8e6df;
    padding:8px 16px; border-radius:999px; font-size:12.5px; backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.07);
  }
  #controls b { color:#ffd24a; }

  #pass {
    position:absolute; top:16px; right:16px; width:266px;
    background:var(--panel); border-radius:18px; overflow:hidden;
    box-shadow:0 16px 40px rgba(0,0,0,.5); transition:transform .25s ease;
    border:1px solid rgba(0,0,0,.08);
  }
  #pass.collapsed { transform:translateX(calc(100% - 44px)); }
  #pass .ph { background:linear-gradient(135deg,#2f7ad6,#1c4fa0); color:#fff; padding:13px 16px; display:flex; align-items:center; gap:9px; }
  #pass .ph .logo { font-size:20px; }
  #pass .ph .name { font-weight:800; letter-spacing:.5px; font-size:15px; line-height:1.05; }
  #pass .ph .name small { display:block; font-weight:600; font-size:9.5px; opacity:.85; letter-spacing:2px; }
  #pass .ph .tab { margin-left:auto; font-size:10.5px; opacity:.8; letter-spacing:1px; }
  #pass .body { padding:14px 16px 16px; }
  #pass .route { display:flex; align-items:center; justify-content:space-between; margin-bottom:13px; }
  #pass .route .code { font-size:27px; font-weight:800; letter-spacing:1px; }
  #pass .route .sub { font-size:10.5px; color:#7a756a; margin-top:1px; text-align:center; }
  #pass .route .plane { color:#1c56b0; font-size:17px; }
  #pass .grid { display:grid; grid-template-columns:1fr 1fr; gap:11px 12px; }
  #pass .cell .lbl { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:#a7a191; }
  #pass .cell .val { font-size:15px; font-weight:700; margin-top:1px; }
  #pass .cell .badge { display:inline-block; margin-top:3px; }
  #pass .seatrow { margin-top:13px; padding-top:12px; border-top:1px dashed #d8d2c4; display:flex; align-items:flex-end; justify-content:space-between; }
  #pass .seat .lbl { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:#a7a191; }
  #pass .seat .val { font-size:31px; font-weight:800; line-height:.95; }
  #pass .seat .cls { font-size:11px; font-weight:700; margin-top:3px; }
  .cls.business { color:#7a4bd0; } .cls.economy { color:#2f8f6b; }
  .badge { padding:6px 12px; border-radius:999px; font-size:12px; font-weight:800; letter-spacing:.4px; text-align:center; box-shadow:inset 0 0 0 1px rgba(0,0,0,.06); }
  .badge.silver{background:linear-gradient(135deg,#eef1f4,#bbc2cb);color:#464c53}
  .badge.gold{background:linear-gradient(135deg,#f7df94,#d8ae2f);color:#5a4506}
  .badge.platinum{background:linear-gradient(135deg,#e2ebf0,#a2b8c4);color:#2c424d}
  .badge.premium{background:linear-gradient(135deg,#3b2c6d,#6f4dd2);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
  #pass .status { margin-top:13px; text-align:center; font-size:12px; font-weight:700; padding:8px; border-radius:9px; background:#efece3; color:#6a655a; }
  #pass .status.boarding { background:#fff2cf; color:#8a6a00; }
  #pass .status.now { background:#e8f8ee; color:#1c7a45; }
  #pass .status.boarded { background:#dff3e6; color:#1c7a45; }
  /* keep the HUD from overlapping on narrow windows */
  #banner { max-width: 46vw; overflow: hidden; text-overflow: ellipsis; }
  @media (max-width: 820px){
    #pass { width: 216px; }
    #pass .seat .val { font-size:26px; }
    #banner { max-width: none; top: auto; bottom: 50px; font-size: 13px; padding: 8px 16px; }
    #toast { top: 14px; }
  }

  #welcome { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, rgba(12,14,18,.5), rgba(8,9,12,.92)); backdrop-filter:blur(3px); z-index:5; }
  #welcome.show { display:flex; animation:fade .5s; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  #welcome .card { text-align:center; color:#fff; }
  #welcome .big { font-size:46px; font-weight:800; }
  #welcome .sub { font-size:16px; opacity:.82; margin-top:10px; }
  #welcome .sub b { color:#ffd24a; }
  #skip { position:absolute; bottom:14px; right:16px; display:none; background:rgba(18,20,26,.82); color:#ffd24a;
    border:1px solid rgba(255,255,255,.12); padding:9px 16px; border-radius:11px; font-size:13px; font-weight:700;
    cursor:pointer; box-shadow:0 8px 22px rgba(0,0,0,.4); z-index:6; }
  #skip:hover { background:rgba(30,34,42,.92); }
</style>

<canvas id="game"></canvas>

<div id="banner"><span class="dotix"></span><span class="step-no"></span><span class="text"></span></div>
<div id="autopilot"><span class="dot"></span> AUTOPILOT</div>
<div id="prompt"><kbd>E</kbd><span></span></div>
<div id="toast"><span class="pin">📣</span><span class="t"></span></div>

<div id="pass">
  <div class="ph"><span class="logo">✈</span><span class="name">FocusAir<small>BOARDING PASS</small></span><span class="tab">TAB ⟩</span></div>
  <div class="body">
    <div class="route">
      <div><div class="code" id="p-from">ARN</div><div class="sub" id="p-fromname">Stockholm</div></div>
      <div class="plane">✈</div>
      <div><div class="code" id="p-to">—</div><div class="sub" id="p-toname">—</div></div>
    </div>
    <div class="grid">
      <div class="cell"><div class="lbl">Flight</div><div class="val" id="p-flight">—</div></div>
      <div class="cell"><div class="lbl">Gate</div><div class="val" id="p-gate">—</div></div>
      <div class="cell"><div class="lbl">Boarding</div><div class="val" id="p-time">—</div></div>
      <div class="cell"><div class="lbl">Member</div><div><span class="badge" id="p-member">—</span></div></div>
    </div>
    <div class="seatrow">
      <div class="seat"><div class="lbl">Seat</div><div class="val" id="p-seat">—</div><div class="cls" id="p-class">—</div></div>
      <div class="seat" style="text-align:right"><div class="lbl">Group</div><div class="val" id="p-group" style="font-size:22px">—</div></div>
    </div>
    <div class="status" id="p-status">Not boarding yet</div>
  </div>
</div>

<div id="controls">
  <span><b>WASD</b> move</span><span><b>E</b> interact</span><span><b>G</b> autopilot</span><span><b>Tab</b> pass</span>
</div>
<button id="skip">Skip to flight ⏭</button>

<div id="welcome"><div class="card">
  <div class="big">Welcome aboard ✈</div>
  <div class="sub">FocusAir now departing to <b id="w-dest">—</b></div>
</div></div>

<script>
(() => {
"use strict";

// ---- FocusAir integration: config passed from the parent app via URL params ----
const P = new URLSearchParams(location.search);
const CFG = {
  embedded: P.has('seat') || P.has('dest'),
  origin: P.get('origin') || 'ARN', originCity: P.get('originCity') || 'Stockholm',
  dest: P.get('dest') || '', destCity: P.get('destCity') || '',
  seat: (P.get('seat') || '').toUpperCase(), member: P.get('member') || '',
  flight: P.get('flight') || '', gate: P.get('gate') || '',
};
function faDone(skipped){ try { parent.postMessage({ type:'airport-done', skipped: !!skipped }, '*'); } catch (e) {} }

// ============================================================ CONFIG
const TILE = 32;
const WORLD_W = 142, WORLD_H = 24;
const SPEED = 210, AUTO_SPEED = 226;
const N_PASSENGERS = 34;      // incl. player — board this flight (fills the plane)
const N_AMBIENT = 14;         // endless loopers, never board — keep the terminal busy

const T = { OUT:0, FLOOR:1, WALL:2, CARPET:3, METAL:4, GLASS:5, TARMAC:6, RUNNER:7 };
const WALK = { [T.FLOOR]:1, [T.CARPET]:1, [T.METAL]:1, [T.RUNNER]:1 };
const GROUP_ORDER = ["Premium","Platinum","Gold","Silver"];

// ============================================================ CANVAS
const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
let VW=0, VH=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  VW = window.innerWidth; VH = window.innerHeight;
  canvas.width = VW*DPR; canvas.height = VH*DPR;
  canvas.style.width = VW+"px"; canvas.style.height = VH+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", resize); resize();

// ============================================================ MAP
const grid=[], blocked=[];
for (let y=0;y<WORLD_H;y++){ grid.push(new Array(WORLD_W).fill(T.OUT)); blocked.push(new Array(WORLD_W).fill(false)); }
const rect=(x0,y0,x1,y1,t)=>{ for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++) if(x>=0&&x<WORLD_W&&y>=0&&y<WORLD_H) grid[y][x]=t; };
const ring=(x0,y0,x1,y1)=>{ for(let x=x0;x<=x1;x++){grid[y0][x]=T.WALL;grid[y1][x]=T.WALL;} for(let y=y0;y<=y1;y++){grid[y][x0]=T.WALL;grid[y][x1]=T.WALL;} };
const block=(x0,y0,x1,y1)=>{ for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++) if(x>=0&&x<WORLD_W&&y>=0&&y<WORLD_H) blocked[y][x]=true; };

rect(1,1,88,22,T.FLOOR);
ring(0,0,89,23);
rect(36,4,54,20,T.METAL);            // security
rect(56,2,87,21,T.CARPET);           // lounge
for(let x=57;x<=86;x++) grid[1][x]=T.GLASS;
rect(56,0,87,0,T.TARMAC);
// central concourse runner (guides the eye + flow)
rect(2,12,55,13,T.RUNNER);
// jet bridge — enters a SIDE door near the front, into a galley/vestibule (not straight down the aisle)
rect(89,9,97,11,T.FLOOR);
for(let x=88;x<=97;x++){ if(grid[8][x]===T.OUT)grid[8][x]=T.WALL; if(grid[12][x]===T.OUT)grid[12][x]=T.WALL; }
// cabin — business (2+2) up front, a gap, then economy (3+3); cockpit at the nose
const CBX0=96,CBX1=133,CBY0=8,CBY1=16;
rect(CBX0,CBY0,CBX1,CBY1,T.METAL);
const CABIN_DOOR = {x:97,y:9};              // top-side boarding door / vestibule

// --- solid fences (block movement AND get drawn as rails) ---
const fences=[];
function fence(x0,y0,x1,y1){ block(x0,y0,x1,y1); for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++) fences.push({x,y}); }

// furniture blocks
block(3,6,7,9);                                         // baggage carousel body
block(10,5,28,5);                                       // checkin desk bank
block(10,3,28,3);                                       // baggage belt (solid)
block(83,9,84,9);                                       // gate podium
block(60,11,60,11); block(72,4,72,4);                   // planters

// check-in: three fenced lanes — you must queue up the lane to the desk
for(const fx of [12,15,16,17,18,21,22,23,24,27]) fence(fx,6,fx,11);
// security: two fenced scanner lanes (top y10, bottom y14), open at the back (x40)
fence(41,9,48,9);  fence(41,11,48,11);
fence(41,13,48,13); fence(41,15,48,15);
// boarding: fenced lane up to the gate podium
fence(81,12,81,16); fence(83,12,83,16);

// ============================================================ STATIONS
const tc=(tx,ty)=>({x:tx*TILE+TILE/2, y:ty*TILE+TILE/2, tx, ty});
function mkLine(sx, sy, dx, dy){ return { sx, sy, dx, dy, spacing:1.05, members:[] }; }
const checkinCounters = [                    // service sits right at the desk front (y7)
  { service:{x:13,y:7}, line:mkLine(13,7,0,1) },
  { service:{x:19,y:7}, line:mkLine(19,7,0,1) },
  { service:{x:25,y:7}, line:mkLine(25,7,0,1) },
];
const securityCounters = [                   // two scanner lanes — pick the shorter one
  { service:{x:48,y:10}, line:mkLine(48,10,-1,0) },
  { service:{x:48,y:14}, line:mkLine(48,14,-1,0) },
];
const boardingLine = mkLine(82, 11, 0, 1);
const BAGGAGE = { pickup:{x:6,y:11} };       // grab your bag off the carousel first
const BAGGAGE_POINTS = [{x:2,y:7},{x:2,y:8},{x:2,y:9},{x:3,y:10},{x:4,y:10},{x:5,y:10},{x:6,y:10},{x:7,y:10},{x:8,y:10},{x:8,y:9},{x:8,y:8},{x:8,y:7}];
const SECURITY = { scanners:[{x:48,y:10},{x:48,y:14}] };
const GATE = { service:{x:82,y:11} };
const CABIN_ENTRY = {x:97,y:11};
const STAFF_DATA = [
  {x:13,y:4,shirt:"#2f6fd0"},{x:19,y:4,shirt:"#2f6fd0"},{x:25,y:4,shirt:"#2f6fd0"},
  {x:49,y:10,shirt:"#2b2f38"},{x:49,y:14,shirt:"#2b2f38"},
  {x:83,y:8,shirt:"#1c56b0"},
];
function buildStaff(){ return STAFF_DATA.map(s=>({x:s.x*TILE+TILE/2,y:s.y*TILE+TILE/2,r:9,appear:{skin:pick(SKINS),hair:pick(HAIRS),shirt:s.shirt,bald:false,hat:true},staff:true,seated:false,hasBag:false,walkPhase:0,dir:Math.PI/2,sub:{},steps:[]})); }

// lounge chairs
const LOUNGE_CHAIRS = [];
for (const x of [58,60,62,64,66,68,70]) for (const y of [4,6,8,15,17,19]) LOUNGE_CHAIRS.push({x,y,taken:null});

// ============================================================ SEATS
function buildSeats(){
  const s=[]; const add=(tx,ty,label,cls)=>s.push({tx,ty,label,cls,cx:tx*TILE+TILE/2,cy:ty*TILE+TILE/2,taken:null});
  // Business — 4 roomy rows, 2+2, spaced 2 tiles apart
  [99,101,103,105].forEach((x,i)=>{ const r=i+1;
    add(x,10,r+"A","business"); add(x,11,r+"C","business");   // left pair
    add(x,13,r+"D","business"); add(x,14,r+"F","business");   // right pair
  });
  // (x106,107 left empty as a galley / gap between the classes)
  // Economy — 24 rows, 3+3
  for(let i=0;i<24;i++){ const x=108+i, r=5+i;
    add(x,9,r+"A","economy"); add(x,10,r+"B","economy"); add(x,11,r+"C","economy");
    add(x,13,r+"D","economy"); add(x,14,r+"E","economy"); add(x,15,r+"F","economy");
  }
  return s;
}
const SEATS = buildSeats();
// mark seat tiles so pathfinding routes down the AISLE and only steps into a seat at the end
const seatTiles = new Set(); for(const s of SEATS) seatTiles.add(s.ty*WORLD_W + s.tx);

// ============================================================ RNG / FLIGHT
const DESTS=[["KEF","Reykjavík"],["ZRH","Zürich"],["LIS","Lisbon"],["TOS","Tromsø"],["SPU","Split"],["PMO","Palermo"],["OPO","Porto"],["BCN","Barcelona"],["DBV","Dubrovnik"],["EDI","Edinburgh"]];
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
function rollMember(){ const r=Math.random(); return r<.45?"Silver":r<.75?"Gold":r<.92?"Platinum":"Premium"; }
function wantsBusiness(m){ return m==="Premium" ? true : m==="Platinum" ? Math.random()<.7 : m==="Gold" ? Math.random()<.2 : Math.random()<.05; }
function makeFlight(){
  const hh=6+Math.floor(Math.random()*15), mm=pick(["05","15","25","35","45","55"]);
  const time=(hh<10?"0"+hh:hh)+":"+mm;
  if(CFG.embedded){
    return { destCode:CFG.dest||"???", destCity:CFG.destCity||CFG.dest||"Destination",
             flightNo:CFG.flight||"FA-"+(100+Math.floor(Math.random()*899)),
             gate:CFG.gate||(pick(["A","B"])+(1+Math.floor(Math.random()*20))), time,
             originCode:CFG.origin, originCity:CFG.originCity };
  }
  const d=pick(DESTS);
  return { destCode:d[0], destCity:d[1], flightNo:"FA-"+(100+Math.floor(Math.random()*899)),
           gate:pick(["A","B"])+(1+Math.floor(Math.random()*20)), time, originCode:"ARN", originCity:"Stockholm" };
}

// ============================================================ APPEARANCE
const SKINS=["#f0cba0","#e3b183","#c98d5e","#a9714a","#8a5a34"];
const HAIRS=["#2b2320","#4a3526","#6b4a2f","#8a8a8a","#c9a24a","#20222a","#5a3a2a"];
const SHIRTS=["#c85a4a","#4a76b0","#5aa06a","#c9a24a","#8a5aa0","#3aa0a0","#d07a3a","#6a7a8a","#b04a6a","#4a9a7a"];
function mkAppear(){ return { skin:pick(SKINS), hair:pick(HAIRS), shirt:pick(SHIRTS), bald:Math.random()<.12, hat:Math.random()<.14 }; }

// ============================================================ AGENTS
let world;
function freshWorld(prev){
  const flight = makeFlight();
  // reset shared station/seat/chair state
  ALL_LINES.forEach(l=>l.members.length=0);
  SEATS.forEach(s=>s.taken=null); LOUNGE_CHAIRS.forEach(c=>c.taken=null);
  const wasAuto = prev ? prev.player.autoWanted : false;

  const agents = prev ? prev.agents : [];
  if (!prev){
    for (let i=0;i<N_PASSENGERS;i++) agents.push(mkAgent(i===0, i));
    for (let i=0;i<N_AMBIENT;i++)   agents.push(mkAgent(false, N_PASSENGERS+i, true));
  }

  // assign seats + membership to passengers (not ambient)
  const biz=shuffle(SEATS.filter(s=>s.cls==="business").slice());
  const eco=shuffle(SEATS.filter(s=>s.cls==="economy").slice());
  const passengers = agents.filter(a=>!a.ambient);
  for (const a of passengers){
    a.member = a.isPlayer ? rollMember() : rollMember();
    let seat = (wantsBusiness(a.member) && biz.length) ? biz.pop() : (eco.length ? eco.pop() : biz.pop());
    a.seat = seat; if (seat) seat.taken = a;
    a.groupIdx = GROUP_ORDER.indexOf(a.member);
    resetAgent(a, flight);
  }
  // integration: the player boards with the seat + tier chosen in FlightGlobe
  if (CFG.embedded){
    const pl = agents[0];
    if (CFG.member){ pl.member = CFG.member; pl.groupIdx = Math.max(0, GROUP_ORDER.indexOf(CFG.member)); }
    if (CFG.seat){
      let target = SEATS.find(s=>s.label===CFG.seat);
      if (!target){ target = pl.seat || SEATS.find(s=>!s.taken) || SEATS[0]; target.label = CFG.seat; }
      if (pl.seat && pl.seat!==target) pl.seat.taken = null;
      if (target.taken && target.taken!==pl){ const o=target.taken; o.seat = SEATS.find(s=>!s.taken && s!==target); if (o.seat) o.seat.taken=o; }
      pl.seat = target; target.taken = pl;
    }
  }
  for (const a of agents.filter(x=>x.ambient)){ a.member=rollMember(); a.groupIdx=99; resetAgent(a, flight); }

  world = {
    flight, agents, staff: buildStaff(),
    player: agents[0],
    boarding: { open:false, currentGroup:-1, clock:0, groupTimer:0, delay:16, announced:-1, lastGroupAt:0 },
    fx: [], toastTimer:0, welcomeTimer:0, done:false, departing:false, runClock:0,
  };
  world.player.autoWanted = wasAuto;
  world.player.autopilot = wasAuto;
  setAutopilotBadge(wasAuto);
  buildPass(); setBanner();
  world.passPopped = false;
  document.getElementById("pass").classList.add("collapsed");   // pass tucked away until it's your turn at the gate
  // warm up so the airport is already full of flow (kept < boarding delay so boarding never fires here)
  for (let i=0;i<820;i++) simulate(1/60, true);
  world.runClock = 0;
  Object.assign(world.boarding, { open:false, currentGroup:-1, clock:0, groupTimer:0, announced:-1 });
  world.fx.length = 0; for (const k in objFlash) delete objFlash[k];
  world.toastTimer = 0; toastEl.classList.remove("show");
  updatePassStatus();
  return world;
}
function mkAgent(isPlayer, idx, ambient){
  return { isPlayer:!!isPlayer, ambient:!!ambient, idx,
    x:5*TILE, y:12*TILE, r:9, dir:0, appear:mkAppear(),
    member:"Silver", seat:null, groupIdx:0,
    step:0, sub:{}, path:null, pathGoal:null, seated:false, hasBag:true, walkPhase:0, spd:1,
    autopilot:false, autoWanted:false, entry:0, done:false,
    segments:null, segIndex:0, autoSeg:false, startSeg:false };
}
function resetAgent(a, flight){
  a.x = (2 + (a.idx*7)%7) * TILE; a.y = (7 + (a.idx*5)%10) * TILE;   // spread across the entrance hall
  if(a.isPlayer){ a.x=5*TILE; a.y=12*TILE; }
  a.dir=0; a.step=0; a.sub={}; a.path=null; a.pathGoal=null;
  a.seated=false; a.hasBag=false; a.done=false; a.walkPhase=0;    // you arrive without a bag — grab it at the carousel
  a.spd = a.isPlayer ? 1 : (0.75 + Math.random()*0.6);           // some hurry, some dawdle
  a.entry = a.isPlayer ? 0 : (a.idx*0.7 + Math.random()*0.6);   // arrive quickly so almost everyone is moving
  if(a.isPlayer){ a.segments=buildPlayerSegments(); a.segIndex=0; a.autoSeg=false; a.startSeg=false; a.steps=[]; }
  else a.steps = a.ambient ? buildAmbientSteps() : buildPassengerSteps(a);
}

// ============================================================ STEP LISTS
const CHECKIN_TASKS = ["Passport","Weigh bag","Boarding pass","Bag drop"];
const SECURITY_TASKS = ["Liquids out","Laptop out","Into tray"];
function buildPassengerSteps(a){

// The player runs the flow one SEGMENT at a time (press E in a zone → auto-run that segment).

// ============================================================ PATHFINDING
function walkableTile(tx,ty){ if(tx<0||ty<0||tx>=WORLD_W||ty>=WORLD_H) return false; if(blocked[ty][tx]) return false; return !!WALK[grid[ty][tx]]; }
function findPath(sx,sy,gx,gy){
  if(!walkableTile(gx,gy)){ // snap to nearest walkable neighbour of goal
    const nb=[[gx+1,gy],[gx-1,gy],[gx,gy+1],[gx,gy-1]].find(([x,y])=>walkableTile(x,y));
    if(!nb) return null; gx=nb[0]; gy=nb[1];
  }
  const key=(x,y)=>y*WORLD_W+x;
  const open=[{x:sx,y:sy,g:0,f:Math.abs(sx-gx)+Math.abs(sy-gy),p:null}];
  const best=new Map([[key(sx,sy),0]]); const dirs=[[1,0],[-1,0],[0,1],[0,-1]]; let it=0;
  while(open.length && it++<9000){
    let bi=0; for(let i=1;i<open.length;i++) if(open[i].f<open[bi].f) bi=i;
    const c=open.splice(bi,1)[0];
    if(c.x===gx&&c.y===gy){ const p=[]; let n=c; while(n){p.push({x:n.x,y:n.y}); n=n.p;} return p.reverse(); }
    for(const[dx,dy]of dirs){ const nx=c.x+dx,ny=c.y+dy; if(!walkableTile(nx,ny))continue;
      const stepCost = seatTiles.has(ny*WORLD_W+nx) ? 6 : 1;   // crossing seats is costly → prefer the aisle
      const ng=c.g+stepCost,k=key(nx,ny); if(best.has(k)&&best.get(k)<=ng)continue; best.set(k,ng);
      open.push({x:nx,y:ny,g:ng,f:ng+Math.abs(nx-gx)+Math.abs(ny-gy),p:c}); } }
  return null;
}

// ============================================================ COLLISION
function canBeAt(px,py,r){ for(const[x,y]of[[px-r,py-r],[px+r,py-r],[px-r,py+r],[px+r,py+r]]){ if(!walkableTile(Math.floor(x/TILE),Math.floor(y/TILE))) return false; } return true; }
function moveBy(a,dx,dy){ if(dx&&canBeAt(a.x+dx,a.y,a.r)) a.x+=dx; if(dy&&canBeAt(a.x,a.y+dy,a.r)) a.y+=dy; }

// ============================================================ LINES (queues)
const ALL_LINES = [...checkinCounters.map(c=>c.line), ...securityCounters.map(c=>c.line), boardingLine];
const ALL_COUNTERS = [...checkinCounters, ...securityCounters];
// Re-order each queue by how far each member actually is down the lane (front-most first). This is
// what stops line-cutting: your slot follows your real position, so you can't reserve a spot ahead
// of someone who's physically in front of you, and whoever gets there first is served first.
function sortLine(line){ const sx=(line.sx+0.5)*TILE, sy=(line.sy+0.5)*TILE, dx=line.dx, dy=line.dy;
  line.members.sort((a,b)=> ((a.x-sx)*dx+(a.y-sy)*dy) - ((b.x-sx)*dx+(b.y-sy)*dy)); }
function slotPos(line, idx){ return { x:(line.sx+line.dx*idx*line.spacing)*TILE+TILE/2, y:(line.sy+line.dy*idx*line.spacing)*TILE+TILE/2 }; }
function lineTarget(line, a){ const i=line.members.indexOf(a); return slotPos(line, i<0?line.members.length:i); }
function backSlot(line){ return slotPos(line, line.members.length); }   // the spot behind whoever's actually in line
function joinLine(line,a){ if(line.members.indexOf(a)<0) line.members.push(a); }
function leaveLine(line,a){ const i=line.members.indexOf(a); if(i>=0) line.members.splice(i,1); }
function isFront(line,a){ return line.members.indexOf(a)===0; }
function chooseCounter(a,s){ if(!a.sub.counter){ let best=s.counters[0]; for(const c of s.counters) if((c.committed||0)<(best.committed||0)) best=c; a.sub.counter=best; } return a.sub.counter; }

// ============================================================ BOARDING
function groupCalled(a){ const b=world.boarding; return b.open && a.groupIdx<=b.currentGroup; }
function updateBoarding(dt){
  const b=world.boarding; b.clock+=dt;
  if(!b.open && b.clock>=b.delay){ b.open=true; b.currentGroup=0; b.groupTimer=0; announceGroup(0); updatePassStatus(); }
  if(b.open){
    b.groupTimer+=dt;
    if(b.currentGroup<GROUP_ORDER.length-1){
      const interval = world.player.seated ? 3.0 : 5.0;   // groups called steadily
      if(b.groupTimer>=interval){ b.currentGroup++; b.groupTimer=0; announceGroup(b.currentGroup); updatePassStatus(); }
    }
  }
}
function boardingComplete(){ for(const a of world.agents){ if(!a.ambient && !(a.seated&&a.done)) return false; } return true; }   // every passenger is in their seat
function announceGroup(g){ showToast("Now boarding — "+GROUP_ORDER[g]); if(world.player.groupIdx===g) showToast("That's you — "+GROUP_ORDER[g]+" group!"); }

// ============================================================ AGENT AI
function nearest(list, x, y, filter){ let best=null,bd=1e9; for(const c of list){ if(filter&&!filter(c))continue; const d=Math.hypot(c.x*TILE-x,c.y*TILE-y); if(d<bd){bd=d;best=c;} } return best; }
function atPoint(a,p){ return Math.hypot(a.x-(p.x*TILE+TILE/2), a.y-(p.y*TILE+TILE/2))<TILE*0.5; }

function stepTarget(a){
  const s=a.steps[a.step]; if(!s) return null;
  if(s.type==="station"){ const c=chooseCounter(a,s); return {x:c.service.x*TILE+TILE/2, y:c.service.y*TILE+TILE/2}; }   // funnel to the desk (fence keeps it single-file)
  if(s.type==="line") return {x:s.line.sx*TILE+TILE/2, y:s.line.sy*TILE+TILE/2};
  if(s.type==="sitwait"){ if(a.sub.chair) return {x:a.sub.chair.x*TILE+TILE/2, y:a.sub.chair.y*TILE+TILE/2}; return {x:LOUNGE.arriveX, y:LOUNGE.arriveY}; }
  if(s.type==="seat"){ const seat=a.seat; return {x:seat.tx*TILE+TILE/2, y:12*TILE+TILE/2}; }   // down the aisle to your row
  if(s.type==="wander"||s.type==="linger"){ if(a.sub.wp) return {x:a.sub.wp.x*TILE+TILE/2,y:a.sub.wp.y*TILE+TILE/2}; }
  if(s.type==="loop") return {x:4*TILE, y:12*TILE};
  if(s.grab){ if(!a.sub.bagPt) a.sub.bagPt=pick(BAGGAGE_POINTS); return {x:a.sub.bagPt.x*TILE+TILE/2, y:a.sub.bagPt.y*TILE+TILE/2}; }   // spread out around the carousel
  if(s.point) return {x:s.point.x*TILE+TILE/2, y:s.point.y*TILE+TILE/2};
  return null;
}
const LOUNGE={ arriveX:62*TILE, arriveY:12*TILE };

function advance(a){ a.step++; a.sub={}; a.path=null; a.pathGoal=null; if(a.isPlayer){ setBanner(); } }
function playerCounter(a,s){ if(!a.sub.counter){ let best=s.counters[0],bd=1e9; for(const c of s.counters){ const d=Math.hypot(a.x-(c.service.x*TILE+TILE/2),a.y-(c.service.y*TILE+TILE/2)); if(d<bd){bd=d;best=c;} } a.sub.counter=best; } return a.sub.counter; }

function agentStep(a, dt, warm){
  const s=a.steps[a.step]; if(!s) return;
  const tgt=stepTarget(a);

  // ---- station (fenced lane → desk) ----  whoever physically reaches the free desk is served next; no cutting
  if(s.type==="station"){
    const c=chooseCounter(a,s), sp={x:c.service.x*TILE+TILE/2, y:c.service.y*TILE+TILE/2};
    joinLine(c.line,a);
    if(a.sub.running){ if(a.isPlayer) emitBeats(a,s,sp.x,sp.y); a.sub.t+=dt; if((s.dur||0)<=0 || a.sub.t>=s.dur){ a.sub.running=false; if(s.drop)a.hasBag=false; leaveLine(c.line,a); if(s.fx)addFx(c.service.x,c.service.y,s.fx); advance(a); } return; }
    const busy=c.line.members.some(m=>m.sub.running);   // one at a time at the desk
    if(!busy && Math.hypot(a.x-sp.x,a.y-sp.y)<TILE*0.55){ a.sub.running=true; a.sub.t=0; if(s.obj)flashObj(s.obj); }
    return;
  }

  // ---- line ----  (fenced lane, single-file; you clear the front when you physically reach it)
  if(s.type==="line"){
    if(tgt && Math.hypot(a.x-tgt.x,a.y-tgt.y)<TILE*0.55){ advance(a); return; }
    return;
  }
  // ---- act ----
  if(s.type==="act"){
    if(a.sub.running){
      if(a.isPlayer && tgt) emitBeats(a,s,tgt.x,tgt.y);
      a.sub.t+=dt; const dur=s.dur||0;
      if(dur<=0 || a.sub.t>=dur){ finishAct(a,s); }
      return;
    }
    if(tgt && Math.hypot(a.x-tgt.x,a.y-tgt.y)<(a.isPlayer?TILE*0.8:TILE*0.55)){ startAct(a,s); }
    return;
  }
  // ---- through (scanner) ----
  if(s.type==="through"){
    if(a.sub.running){ a.sub.t+=dt; if(a.sub.t>=(s.dur||0.7)){ a.sub.running=false; if(s.leave) leaveLine(s.leave,a); advance(a);} return; }
    if(tgt && Math.hypot(a.x-tgt.x,a.y-tgt.y)<(a.isPlayer?TILE*0.75:TILE*0.5)){ a.sub.running=true; a.sub.t=0; addFx(s.point.x,s.point.y,"scan"); }
    return;
  }
  // ---- sitwait ----
  if(s.type==="sitwait"){
    if(!a.sub.chair){ const c=nearest(LOUNGE_CHAIRS,a.x,a.y,ch=>!ch.taken); if(c){ c.taken=a; a.sub.chair=c; } }
    if(a.sub.chair){
      const cp={x:a.sub.chair.x*TILE+TILE/2,y:a.sub.chair.y*TILE+TILE/2};
      if(Math.hypot(a.x-cp.x,a.y-cp.y)<TILE*0.55){ a.x=cp.x; a.y=cp.y; a.seated=true;   // sit ON the chair
        if(groupCalled(a)){ a.seated=false; a.sub.chair.taken=null; a.sub.chair=null; advance(a); }
      }
    }
    return;
  }
  // ---- seat (final) ----  reach your row on the aisle, then settle INTO the seat
  if(s.type==="seat"){
    if(a.sub.done) return;
    const seat=a.seat, aisleX=seat.tx*TILE+TILE/2, aisleY=12*TILE+TILE/2;
    if(Math.abs(a.x-aisleX)<TILE*0.7 && Math.abs(a.y-aisleY)<TILE*1.2){   // at your row on the aisle
      a.x=seat.cx; a.y=seat.cy; a.dir=0; a.seated=true; a.sub.done=true; a.done=true;
    }
    return;
  }
  // ---- wander / linger (ambient) ----  (only pick WALKABLE waypoints, else the agent freezes against furniture)
  if(s.type==="wander" || s.type==="linger"){
    if(!a.sub.wp){ let wx,wy,tries=0; do{ wx=57+Math.floor(Math.random()*28); wy=3+Math.floor(Math.random()*18); }while(!walkableTile(wx,wy)&&++tries<20);
      a.sub.wp={x:wx,y:wy}; a.sub.wt = s.type==="linger" ? 5+Math.random()*7 : 1+Math.random()*2; }   // lingerers hang around longer
    if(tgt && Math.hypot(a.x-tgt.x,a.y-tgt.y)<TILE*0.7){ a.sub.wt-=dt; if(a.sub.wt<=0) advance(a); }
    return;
  }
  // ---- loop (ambient restart) ----
  if(s.type==="loop"){
    if(tgt && Math.hypot(a.x-tgt.x,a.y-tgt.y)<TILE){ a.step=0; a.sub={}; a.hasBag=true; a.appear=mkAppear(); }
    return;
  }
}
function startAct(a,s){ a.sub.running=true; a.sub.t=0; if(!s.dur){ finishAct(a,s); } if(s.obj) flashObj(s.obj); }
function finishAct(a,s){
  a.sub.running=false;
  if(s.grab) a.hasBag=true;
  if(s.drop) a.hasBag=false;
  if(s.leave) leaveLine(s.leave,a);
  if(s.fx) addFx(s.point.x,s.point.y,s.fx);
  advance(a);
}

// ---- collision ----
// NPCs use a GENTLE mutual separation (never a hard block — that would deadlock queues).
// The PLAYER is solid: NPCs get firmly pushed out of the player's body, and the player's own
// manual movement is blocked from entering an occupied tile (see movePlayer).
function pushAgent(a,dx,dy){ if(dx&&canBeAt(a.x+dx,a.y,a.r)) a.x+=dx; if(dy&&canBeAt(a.x,a.y+dy,a.r)) a.y+=dy; }
function resolveCollisions(){
  const A=world.agents, p=world.player;
  // Player is SOLID only while walking manually between segments. While auto-running a segment
  // it sits inside the queue system, so it separates gently like an NPC (a solid player in a
  // 1-tile lane would block the whole queue).
  const pSolid = p && !p.seated && !p.autoSeg;
  const CABX = 88*TILE;         // through the bridge/door and cabin, agents pass through each other (no single-file jam)
  for(let i=0;i<A.length;i++){ const a=A[i]; if(a.seated || a.x>CABX || (a.isPlayer && pSolid)) continue;
    for(let j=i+1;j<A.length;j++){ const b=A[j]; if(b.seated || b.x>CABX || (b.isPlayer && pSolid)) continue;
      const dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy, mr=a.r+b.r;
      if(d2>0.0001 && d2<mr*mr){ const d=Math.sqrt(d2), push=(mr-d)*0.2, nx=dx/d, ny=dy/d;
        pushAgent(a,-nx*push,-ny*push); pushAgent(b,nx*push,ny*push); } } }
  if(pSolid){ for(const b of A){ if(b===p||b.seated) continue;
    const dx=b.x-p.x, dy=b.y-p.y, d=Math.hypot(dx,dy), min=p.r+b.r+1;
    if(d>0.001 && d<min) pushAgent(b, dx/d*(min-d), dy/d*(min-d)); } }
}
// manual player move: blocked by walls/objects AND by other bodies (can't walk through people)
function agentAt(x,y,self){
  for(const a of world.agents){ if(a===self) continue; if(Math.hypot(a.x-x,a.y-y)<self.r+a.r-2) return true; }
  for(const s of world.staff){ if(Math.hypot(s.x-x,s.y-y)<self.r+s.r-2) return true; }
  return false;
}
function movePlayer(p,dx,dy){
  if(dx && canBeAt(p.x+dx,p.y,p.r) && !agentAt(p.x+dx,p.y,p)) p.x+=dx;
  if(dy && canBeAt(p.x,p.y+dy,p.r) && !agentAt(p.x,p.y+dy,p)) p.y+=dy;
}

// ---- player: walk between segments, press E in a zone to auto-run the whole segment ----
function ptInZone(x,y,z){ const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE); return tx>=z[0]&&tx<=z[2]&&ty>=z[1]&&ty<=z[3]; }
function segVerb(seg){ return seg.verb; }
function segDoing(p,seg){ const s=p.steps[p.step]; if(!s) return "…";
  if(s.type==="station") return "Checking in…";
  if(s.type==="line") return seg.key==="gate" ? "Boarding…" : "Waiting in line…";
  if(s.type==="act") return seg.key==="gate" ? "Scanning boarding pass…" : "At the checkpoint…";
  if(s.type==="through") return "Screening…";
  if(s.type==="sitwait") return (world.boarding.open && groupCalled(p)) ? "Boarding — heading to the gate…" : "Waiting for your group ("+p.member+")…";
  if(s.type==="seat") return "Taking your seat…";
  return "…"; }
function startSegment(p){ const seg=p.segments[p.segIndex]; if(!seg) return; p.autoSeg=true; p.steps=seg.steps; p.step=0; p.sub={}; p.path=null; p.pathGoal=null; setBanner(); }
function driveTowardTile(a, way, dt){ const gx=way.x, gy=way.y;
  if(!a.path||!a.pathGoal||a.pathGoal.x!==gx||a.pathGoal.y!==gy){ a.path=findPath(Math.floor(a.x/TILE),Math.floor(a.y/TILE),gx,gy); a.pathGoal={x:gx,y:gy}; }
  followPath(a, dt, AUTO_SPEED, {x:gx*TILE+TILE/2, y:gy*TILE+TILE/2});
}
function updatePlayer(dt){
  const p=world.player;
  if(p.done){ p.autoSeg=false; p.seated=true; return; }
  if(p.autoSeg){
    driveAgent(p,dt); agentStep(p,dt,false);
    if(p.done){ p.autoSeg=false; return; }
    if(p.step>=p.steps.length){ p.autoSeg=false; p.sub={}; p.path=null; p.pathGoal=null; p.segIndex++; setBanner(); }
    p.startSeg=false; return;
  }
  const seg=p.segments[p.segIndex]; if(!seg){ p.startSeg=false; return; }
  const inZone=ptInZone(p.x,p.y,seg.zone);
  if(p.autopilot){ if(inZone) startSegment(p); else driveTowardTile(p, seg.way, dt); }
  else {
    let dx=(keys["d"]||keys["arrowright"]?1:0)-(keys["a"]||keys["arrowleft"]?1:0);
    let dy=(keys["s"]||keys["arrowdown"]?1:0)-(keys["w"]||keys["arrowup"]?1:0);
    if(dx||dy){ const l=Math.hypot(dx,dy); dx/=l; dy/=l; movePlayer(p,dx*SPEED*dt,dy*SPEED*dt); p.dir=Math.atan2(dy,dx); p.walkPhase+=dt*10; p.seated=false; }
    if(inZone && p.startSeg) startSegment(p);
  }
  p.startSeg=false;
}

function driveAgent(a, dt){
  const s=a.steps[a.step]; if(!s) return;
  if(a.sub.running || a.seated || a.sub.done) return;
  const tgt=stepTarget(a); if(!tgt) return;

  // AI / autopilot path-follow (player uses this only while auto-running a segment)
  if(!a.isPlayer && world.runClock<a.entry) return;       // staggered entry
  if(yieldIfContested(a, tgt, dt)) return;                 // gave way this frame — don't also push forward
  const gx=Math.round((tgt.x-TILE/2)/TILE), gy=Math.round((tgt.y-TILE/2)/TILE);
  if(!a.path || !a.pathGoal || a.pathGoal.x!==gx || a.pathGoal.y!==gy){
    a.path=findPath(Math.floor(a.x/TILE),Math.floor(a.y/TILE),gx,gy); a.pathGoal={x:gx,y:gy};
  }
  followPath(a, dt, a.isPlayer?AUTO_SPEED:SPEED, tgt);
}
// If two agents jostle for the same spot heading to the same place, after ~1s the one that's losing
// (further from the target, ties broken by id) yields and steps back behind the other — the line settles.
function yieldIfContested(a, tgt, dt){
  if(a.isPlayer) return false;                             // you hold your place; NPCs give way to you
  if((a.sub.yieldT||0) > 0){                               // currently giving way: back off from the target
    a.sub.yieldT -= dt;
    const dx=a.x-tgt.x, dy=a.y-tgt.y, l=Math.hypot(dx,dy)||1;
    moveBy(a, dx/l*SPEED*(a.spd||1)*dt, dy/l*SPEED*(a.spd||1)*dt);
    a.dir=Math.atan2(-dy,-dx); a.walkPhase+=dt*8; return true;
  }
  const myD=Math.hypot(a.x-tgt.x, a.y-tgt.y); let contested=false;
  for(const b of world.agents){ if(b===a||b.seated) continue;
    if(Math.hypot(a.x-b.x, a.y-b.y) < a.r+b.r+3){          // bodies touching
      const bD=Math.hypot(b.x-tgt.x, b.y-tgt.y);
      if(bD < myD+6 && (bD < myD-2 || a.idx>b.idx)){ contested=true; break; }   // b is at/ahead of my spot → I lose
    } }
  if(contested){ a.sub.jamT=(a.sub.jamT||0)+dt; if(a.sub.jamT>1){ a.sub.jamT=0; a.sub.yieldT=0.5; } }
  else a.sub.jamT=0;
  return false;
}
function followPath(a, dt, spd, tgt){
  let nx,ny;
  if(a.path && a.path.length){
    let n=a.path[0]; nx=n.x*TILE+TILE/2; ny=n.y*TILE+TILE/2;
    if(Math.hypot(nx-a.x,ny-a.y)<5){ a.path.shift(); if(a.path.length){ n=a.path[0]; nx=n.x*TILE+TILE/2; ny=n.y*TILE+TILE/2; } else { nx=tgt.x; ny=tgt.y; } }
  } else { nx=tgt.x; ny=tgt.y; }
  let dx=nx-a.x, dy=ny-a.y; const l=Math.hypot(dx,dy); const v=spd*(a.spd||1);
  if(l>1){ dx/=l; dy/=l; moveBy(a,dx*v*dt,dy*v*dt); a.dir=Math.atan2(dy,dx); a.walkPhase+=dt*10; a.seated=false; }
}

// ============================================================ SIMULATE
function simulate(dt, warm){
  world.runClock+=dt;
  for(const c of ALL_COUNTERS) c.committed=0;                 // balance lanes by who's heading to each (not just who's arrived)
  for(const a of world.agents){ const c=a.sub&&a.sub.counter; if(c) c.committed++; }
  updateBoarding(dt);
  for(const a of world.agents){ if(a.isPlayer) continue; driveAgent(a,dt); agentStep(a,dt,warm); }
  if(!warm) updatePlayer(dt);
  resolveCollisions();
  // fx
  if(!warm){ for(const f of world.fx){ f.t+=dt; } world.fx=world.fx.filter(f=>f.t<f.life); }
  // departure — the flight leaves once EVERY passenger is seated (long fallback in case one is stuck)
  if(world.player.done && !world.done){
    world.departWait=(world.departWait||0)+dt;
    if(boardingComplete() || world.departWait>90) startDeparture();
  }
}
function triggerDepartWatch(){ /* handled in simulate via boardingComplete */ }
function startDeparture(){
  world.done=true;
  document.getElementById("w-dest").textContent=world.flight.destCity;
  document.getElementById("welcome").classList.add("show");
  world.welcomeTimer=3.2;
  const st=document.getElementById("p-status"); st.textContent="Boarded ✓"; st.className="status boarded";
  if(CFG.embedded && !world.signalled){ world.signalled=true; faDone(false); }
}

function render(now){
  ctx.clearRect(0,0,VW,VH);

  ctx.save(); ctx.translate(-Math.round(cam.x),-Math.round(cam.y));
  const x0=Math.max(0,Math.floor(cam.x/TILE)-1), y0=Math.max(0,Math.floor(cam.y/TILE)-1);
  const x1=Math.min(WORLD_W-1,Math.ceil((cam.x+VW)/TILE)), y1=Math.min(WORLD_H-1,Math.ceil((cam.y+VH)/TILE));
  drawOutside(now);
  drawFloors(x0,y0,x1,y1,now);
  drawWallShadows(x0,y0,x1,y1);
  drawWalls(x0,y0,x1,y1);

  drawCockpit(now);
  drawSideDoor();
  drawFurniture(now);

  drawFx(now);

}

function hash(x,y){ let h=(x*73856093)^(y*19349663); h=(h^(h>>13))*1274126177; return ((h^(h>>16))>>>0)/4294967295; }
function drawFloors(x0,y0,x1,y1,now){
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
    const t=grid[y][x], px=x*TILE, py=y*TILE;
    if(t===T.FLOOR){ const a=(x+y)&1; ctx.fillStyle=a?"#d9d2c4":"#d2cabb"; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle="rgba(0,0,0,.035)"; ctx.fillRect(px,py,TILE,1); ctx.fillRect(px,py,1,TILE);
      if(hash(x,y)<0.06){ ctx.fillStyle="rgba(0,0,0,.05)"; ctx.fillRect(px+6,py+6,3,3); } }
    else if(t===T.RUNNER){ ctx.fillStyle="#c7b39a"; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle="rgba(0,0,0,.05)"; ctx.fillRect(px,py,TILE,1);

    else if(t===T.METAL){ const a=(x+y)&1; ctx.fillStyle=a?"#c3c8ce":"#bcc1c8"; ctx.fillRect(px,py,TILE,TILE);
      ctx.strokeStyle="rgba(255,255,255,.18)"; ctx.strokeRect(px+2.5,py+2.5,TILE-5,TILE-5);
      ctx.fillStyle="rgba(0,0,0,.05)"; ctx.fillRect(px,py,TILE,1); }
    else if(t===T.CARPET){ const a=(x+y)&1; ctx.fillStyle=a?"#3d6b73":"#3a666e"; ctx.fillRect(px,py,TILE,TILE);
      ctx.strokeStyle="rgba(255,255,255,.05)"; ctx.beginPath(); ctx.moveTo(px,py+TILE); ctx.lineTo(px+TILE,py); ctx.stroke(); }
    else if(t===T.GLASS){ ctx.fillStyle="#aecdda"; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle="rgba(255,255,255,.4)"; ctx.fillRect(px+5,py+3,5,TILE-6); ctx.fillRect(px+15,py+3,2,TILE-6); }
  }
}

function drawWallShadows(x0,y0,x1,y1){

function drawPlaneHull(){
  const x=CBX0*TILE-6,y=CBY0*TILE-6,w=(CBX1-CBX0+1)*TILE+12,h=(CBY1-CBY0+1)*TILE+12;

  ctx.beginPath(); ctx.moveTo(x+w*0.34,y+h-8); ctx.lineTo(x+w*0.48,y+h+TILE*2.6); ctx.lineTo(x+w*0.6,y+h+TILE*2.6); ctx.lineTo(x+w*0.5,y+h-8); ctx.fill();

  ctx.globalAlpha=.9; roundRect(x+7,y-8,TILE-14,11,2); ctx.fill(); ctx.globalAlpha=1;
  ctx.fillStyle="#2a2f36"; ctx.fillRect(x+TILE/2-1,y+2,2,4); }
function belt(tx,ty,w,now){ const x=tx*TILE,y=ty*TILE; ctx.fillStyle="#3a3f47"; ctx.fillRect(x,y,w*TILE,TILE);
  ctx.strokeStyle="#565c65"; ctx.lineWidth=2; const off=(now/120)%12;
  for(let i=-12;i<w*TILE;i+=12){ ctx.beginPath(); ctx.moveTo(x+i+off,y+3); ctx.lineTo(x+i+off,y+TILE-3); ctx.stroke(); }
  ctx.fillStyle="#2c3037"; ctx.fillRect(x,y,w*TILE,3); ctx.fillRect(x,y+TILE-3,w*TILE,3); }
function table(tx,ty,w){ const x=tx*TILE,y=ty*TILE; ctx.fillStyle="rgba(0,0,0,.1)"; ctx.fillRect(x,y+TILE-3,w*TILE,4);
  ctx.fillStyle="#9aa0a8"; roundRect(x,y,w*TILE,TILE,4); ctx.fill(); ctx.fillStyle="#b2b8c0"; ctx.fillRect(x,y,w*TILE,6); }
function scannerGate(tx,ty,now){ const x=tx*TILE,y=ty*TILE;   // horizontal walk-through arch
  ctx.fillStyle="#aeb4bc"; ctx.fillRect(x-2,y-7,TILE+4,7); ctx.fillRect(x-2,y+TILE,TILE+4,7);
  ctx.fillStyle="#c6ccd3"; ctx.fillRect(x-2,y-7,4,TILE+14); ctx.fillRect(x+TILE-2,y-7,4,TILE+14);
  ctx.strokeStyle="rgba(120,220,190,.85)"; ctx.lineWidth=3; ctx.strokeRect(x+2,y+2,TILE-4,TILE-4);
  const ph=((now/450)%1); ctx.fillStyle="rgba(127,214,192,.55)"; ctx.fillRect(x+3+ph*(TILE-9),y+3,3,TILE-6);   // sweep
  ctx.fillStyle="rgba(127,214,192,.16)"; ctx.fillRect(x+3,y+3,TILE-6,TILE-6); }
function podium(tx,ty){ const x=tx*TILE,y=ty*TILE; ctx.fillStyle="rgba(0,0,0,.12)"; ctx.fillRect(x,y+TILE-3,TILE*2,4);
  ctx.fillStyle="#6f4d34"; roundRect(x,y,TILE*2,TILE,4); ctx.fill(); ctx.fillStyle="#835b3d"; ctx.fillRect(x,y,TILE*2,6);
  const on=objFlash.gate>0||groupCalledAny(); ctx.fillStyle=on?"#3ad18a":"#2f6360"; roundRect(x+TILE*2-9,y+7,6,TILE-12,2); ctx.fill(); }
function groupCalledAny(){ return world.boarding.open; }
function chair(tx,ty){ const x=tx*TILE,y=ty*TILE; ctx.fillStyle="rgba(0,0,0,.1)"; ctx.beginPath(); ctx.ellipse(x+TILE/2,y+TILE-6,11,4,0,0,7); ctx.fill();
  ctx.fillStyle="#33586a"; roundRect(x+5,y+7,TILE-10,TILE-12,5); ctx.fill(); ctx.fillStyle="#3d6678"; roundRect(x+5,y+4,TILE-10,9,4); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.08)"; roundRect(x+7,y+6,TILE-14,3,2); ctx.fill(); }
function planter(tx,ty){ const x=tx*TILE+TILE/2,y=ty*TILE+TILE/2; ctx.fillStyle="#5a4632"; ctx.beginPath(); ctx.arc(x,y+4,9,0,7); ctx.fill();
  ctx.fillStyle="#3f7a44"; for(const a of[0,2,4]){ ctx.beginPath(); ctx.arc(x+Math.cos(a)*5,y-3+Math.sin(a)*4,7,0,7); ctx.fill(); } }
function drawSeats(now){
  // class divider between business (≤x105) and economy (≥x108)
  ctx.fillStyle="rgba(255,255,255,.06)"; ctx.fillRect(106*TILE, CBY0*TILE, TILE, (CBY1-CBY0+1)*TILE);
  ctx.strokeStyle="rgba(47,122,214,.25)"; ctx.lineWidth=2; ctx.strokeRect(106*TILE+3, CBY0*TILE+4, TILE-6, (CBY1-CBY0+1)*TILE-8);
  for(const s of SEATS){ const x=s.tx*TILE,y=s.ty*TILE; const assigned = world.player.seat && s.label===world.player.seat.label;
    const biz = s.cls==="business";
    const pad = biz ? 2 : 4;                                  // business seats are wider/plusher
    ctx.fillStyle="rgba(0,0,0,.1)"; ctx.fillRect(x+pad+1,y+TILE-4,TILE-2*pad-2,3);
    let base = biz ? "#39406a" : "#2f5f5c"; if(assigned) base="#5e46b0";
    ctx.fillStyle=base; roundRect(x+pad,y+4,TILE-2*pad,TILE-7,biz?7:5); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.14)"; roundRect(x+pad,y+4,TILE-2*pad,5,4); ctx.fill();      // headrest
    if(biz){ ctx.fillStyle="rgba(255,255,255,.09)"; ctx.fillRect(x+pad+2,y+TILE/2,TILE-2*pad-4,2); ctx.fillRect(x+pad+2,y+TILE/2+5,TILE-2*pad-4,2); }
    if(assigned){ const pulse=0.5+0.5*Math.sin(now/220); ctx.strokeStyle="rgba(255,210,74,"+(0.55+0.45*pulse)+")"; ctx.lineWidth=3; roundRect(x+1,y+2,TILE-2,TILE-4,7); ctx.stroke(); } }
}

// ---------------- signage ----------------
function drawSigns(){
  sign(14,2,"CHECK-IN","#2f7ad6");
  sign(43,3,"SECURITY","#4a76b0");
  const f=world.flight; sign(70,2,"GATE "+f.gate+" · "+f.destCity.toUpperCase(),"#2f8f6b", world.boarding.open?"NOW BOARDING":null);
}
function sign(tx,ty,text,accent,flash){
  const cx=tx*TILE+TILE/2, y=ty*TILE;
  ctx.font="700 13px -apple-system,Segoe UI,sans-serif"; const w=ctx.measureText(text).width+30;
  ctx.fillStyle="rgba(16,18,24,.9)"; roundRect(cx-w/2,y-2,w,26,7); ctx.fill();
  ctx.fillStyle=accent; roundRect(cx-w/2,y-2,6,26,3); ctx.fill();
  ctx.fillStyle="#f2efe6"; ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillText(text,cx-w/2+16,y+12);
  if(flash){ const on=(performance.now()%900)<500; ctx.fillStyle=on?"#3ad18a":"#1c6b48"; ctx.font="800 11px sans-serif"; ctx.textAlign="center";
    ctx.fillText(flash,cx,y+34); }
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  // pole shadow
  ctx.fillStyle="rgba(0,0,0,.12)"; ctx.fillRect(cx-1,y+24,2,6);
}

// ---------------- waypoint (only BETWEEN segments) ----------------
function drawWaypoint(now){
  const p=world.player; if(p.done||p.autoSeg) return;
  const seg=p.segments[p.segIndex]; if(!seg || ptInZone(p.x,p.y,seg.zone)) return;   // hide once you're in the room
  const cx=seg.way.x*TILE+TILE/2, cy=seg.way.y*TILE+TILE/2; const pulse=(now%1000)/1000; const bob=Math.sin(now/300)*4;
  ctx.save();
  ctx.strokeStyle="rgba(255,210,74,"+(1-pulse)+")"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx,cy,8+pulse*20,0,7); ctx.stroke();
  ctx.fillStyle="rgba(255,210,74,.22)"; ctx.beginPath(); ctx.arc(cx,cy,14,0,7); ctx.fill();
  ctx.fillStyle="#ffd24a"; ctx.beginPath(); ctx.moveTo(cx,cy-26+bob); ctx.lineTo(cx-8,cy-38+bob); ctx.lineTo(cx+8,cy-38+bob); ctx.closePath(); ctx.fill();
  ctx.strokeStyle="rgba(255,210,74,.32)"; ctx.lineWidth=3; ctx.setLineDash([4,10]); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(cx,cy); ctx.stroke();
  ctx.restore();
}

// ---------------- fx ----------------
function drawFx(now){
  for(const f of world.fx){ const k=f.t/f.life; ctx.save();
    if(f.kind==="pop"||f.kind==="gate"||f.kind==="tray"){ ctx.strokeStyle=(f.kind==="gate"?"rgba(58,209,138,":"rgba(255,210,74,")+(1-k)+")"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(f.x,f.y,6+k*18,0,7); ctx.stroke();
      ctx.fillStyle=(f.kind==="gate"?"#3ad18a":"#ffd24a"); ctx.font="800 14px sans-serif"; ctx.textAlign="center"; ctx.globalAlpha=1-k; ctx.fillText(f.kind==="gate"?"✓":"✓",f.x,f.y-18-k*8); }
    if(f.kind==="scan"){ ctx.fillStyle="rgba(127,214,192,"+(0.6*(1-k))+")"; ctx.fillRect(f.x-16,f.y-40,32,80); }
    if(f.kind==="task"){ const rise=k*22; ctx.globalAlpha=Math.min(1,2*(1-k)); ctx.font="700 12px -apple-system,Segoe UI,sans-serif"; ctx.textAlign="center";
      const w=ctx.measureText(f.label).width+16; ctx.fillStyle="rgba(20,40,80,.9)"; roundRect(f.x-w/2,f.y-rise-13,w,17,6); ctx.fill();
      ctx.fillStyle="#bfe0ff"; ctx.fillText("✓ "+f.label,f.x,f.y-rise); }
    ctx.restore(); }
  for(const k in objFlash){ objFlash[k]-=1/60; if(objFlash[k]<=0) delete objFlash[k]; }
}

// ---------------- pawns ----------------
function drawAgent(a, now){
  const seated=a.seated; const bob = seated?0 : Math.abs(Math.sin(a.walkPhase))*1.6;
  const x=a.x, y=a.y - bob;
  shadowEllipse(a.x, a.y+9, seated?9:11, seated?4:5);
  if(a.hasBag && !seated) drawBag(a);
  ctx.save(); ctx.translate(x,y);
  const yo = seated?2:0;
  // body with vertical shade
  const g=ctx.createLinearGradient(0,yo-10,0,yo+10); g.addColorStop(0,shade(a.appear.shirt,1.12)); g.addColorStop(1,shade(a.appear.shirt,.82));
  ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(0,yo,9,10,0,0,7); ctx.fill();
  // staff stripe
  // head
  const hg=ctx.createLinearGradient(0,yo-15,0,yo-4); hg.addColorStop(0,shade(a.appear.skin,1.08)); hg.addColorStop(1,shade(a.appear.skin,.92));
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(0,yo-8,6.5,0,7); ctx.fill();
  // hair / hat
  if(a.appear.hat){ ctx.fillStyle="#2a3550"; ctx.beginPath(); ctx.arc(0,yo-9,6,Math.PI,0); ctx.fill(); ctx.fillRect(-7,yo-9,14,2); }
  else if(!a.appear.bald){ ctx.fillStyle=a.appear.hair; ctx.beginPath(); ctx.arc(0,yo-9.5,6.4,Math.PI*1.02,Math.PI*1.98); ctx.fill(); }
  ctx.restore();
  if(a.isPlayer){ ctx.save(); ctx.translate(a.x,a.y);
    ctx.strokeStyle="rgba(255,210,74,.9)"; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(0,9,12,0,7); ctx.stroke();
    ctx.fillStyle="#ffd24a"; ctx.font="800 10px sans-serif"; ctx.textAlign="center"; ctx.fillText("YOU",0,-19); ctx.restore(); }
}
function drawBag(a){ const bx=a.x-Math.cos(a.dir)*13, by=a.y-Math.sin(a.dir)*13+3;
  ctx.save(); ctx.translate(bx,by); ctx.fillStyle="rgba(0,0,0,.12)"; ctx.beginPath(); ctx.ellipse(0,7,6,2.5,0,0,7); ctx.fill();
  ctx.fillStyle="#7a4a2c"; roundRect(-5,-6,10,12,2); ctx.fill(); ctx.fillStyle="#5f3921"; ctx.fillRect(-5,-1,10,2);
  ctx.strokeStyle="#5f3921"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,-6,3,Math.PI,0); ctx.stroke(); ctx.restore(); }
function shade(hex,f){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,r*f)|0; g=Math.min(255,g*f)|0; b=Math.min(255,b*f)|0; return "rgb("+r+","+g+","+b+")"; }

function drawVignette(){ const g=ctx.createRadialGradient(VW/2,VH/2,Math.min(VW,VH)*0.4,VW/2,VH/2,Math.max(VW,VH)*0.72);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,.28)"); ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH); }

// ============================================================ PLAYER PROMPT
function updatePrompt(){
  const p=world.player, el=document.getElementById("prompt"); let show=false;
  if(!p.done && !p.autoSeg && !p.autopilot){ const seg=p.segments[p.segIndex];
    if(seg && ptInZone(p.x,p.y,seg.zone)){ show=true; el.querySelector("span").textContent=seg.verb; } }
  el.classList.toggle("show",show);
}

// Pop the boarding pass out of its tab when it's the player's turn to board / show the ticket.
function popPassIfBoarding(){
  const p=world.player; if(world.passPopped || p.done) return;
  const seg=p.segments[p.segIndex];
  if(p.autoSeg && seg && seg.key==="gate"){ const s=p.steps[p.step];
    if(s && (s.type==="line" || (s.type==="act" && s.obj==="gate"))){
      document.getElementById("pass").classList.remove("collapsed");
      world.passPopped=true; showToast("Boarding — please have your pass ready");
    } }
}

// ============================================================ LOOP
let lastT=performance.now();
function loop(now){
  let dt=(now-lastT)/1000; lastT=now; if(dt>0.05)dt=0.05;
  if(world.done){ world.welcomeTimer-=dt; if(world.welcomeTimer<=0){ document.getElementById("welcome").classList.remove("show"); if(!CFG.embedded) freshWorld(world); } }
  else { simulate(dt,false);
    if(world.toastTimer>0){ world.toastTimer-=dt; if(world.toastTimer<=0) toastEl.classList.remove("show"); }
    popPassIfBoarding(); setBanner(); }
  updateCamera(); updatePrompt(); render(now);
  requestAnimationFrame(loop);
}

// ============================================================ START
freshWorld(null);
const skipBtn=document.getElementById("skip");
if(CFG.embedded && skipBtn){ skipBtn.style.display="block"; skipBtn.onclick=()=>{ if(!world.signalled){ world.signalled=true; faDone(true); } }; }
requestAnimationFrame(loop);

})();
</script>
